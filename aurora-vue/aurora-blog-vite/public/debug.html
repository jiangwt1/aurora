<!DOCTYPE html>
<html>
<head>
    <title>Debug Info</title>
</head>
<body>
    <h1>Debug Information</h1>
    <script>
        document.write('<p>window.location.href: ' + window.location.href + '</p>');
        document.write('<p>window.location.protocol: ' + window.location.protocol + '</p>');
        document.write('<p>window.location.hostname: ' + window.location.hostname + '</p>');
        document.write('<p>window.location.port: ' + window.location.port + '</p>');
        document.write('<p>window.location.origin: ' + window.location.origin + '</p>');
    </script>
</body>
</html>
