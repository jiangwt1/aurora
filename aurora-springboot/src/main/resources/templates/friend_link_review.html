<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>友链审核提醒</title>
</head>
<body>
<div style="border-radius: 10px; font-size: 13px; color: #555555; width: 666px; margin: 50px auto; border: 1px solid #eee; max-width: 100%; background: #ffffff repeating-linear-gradient(-45deg, #fff, #fff 1.125rem, transparent 1.125rem, transparent 2.25rem); box-shadow: 0 1px 5px rgb(0 0 0 / 15%);">
    <div style="background: #49BDAD; color: #ffffff; border-radius: 10px 10px 0 0; background-image: -moz-linear-gradient(0deg, rgb(67, 198, 184), rgb(255, 209, 244)); background-image: -webkit-linear-gradient(0deg, rgb(67, 198, 184), rgb(255, 209, 244)); height: 66px;">
        <p style="font-size: 15px; word-break: break-all; padding: 23px 32px; margin: 0; background-color: hsla(0, 0%, 100%, 0.4); border-radius: 10px 10px 0 0;">
            友链审核提醒
        </p>
    </div>
    <div style="margin: 20px auto; width: 90%">
        <div style="background: #f5f5f5; margin: 20px 0; padding: 15px; border-radius: 5px; font-size: 14px;">
            <p style="text-align: center; font-weight: bold; color: black;" th:utext="${linkName}">申请成为友链，详情如下</p>
            <p><strong>友链名称：</strong><span th:text="${linkName}"></span></p>
            <p><strong>友链头像：</strong><img th:src="${linkAvatar}" style="max-width: 100px; max-height: 100px;"></p>
            <p><strong>友链地址：</strong><a th:href="${linkAddress}" target="_blank" th:text="${linkAddress}"></a></p>
            <p><strong>友链介绍：</strong><span th:text="${linkIntro}"></span></p>
        </div>
        <div style="color: #8c8c8c; font-size: 10px; width: 100%; text-align: center; word-wrap: break-word;">
            <p style="padding: 20px">
                请点击以下按钮进行审核：<br>
            <p>
                <a style="background-color: green; color: white; padding: 10px; text-decoration: none; border-radius: 5px; margin-right: 10px;" th:href="${approveUrl}" >同意</a>
                <a style="background-color: red; color: white; padding: 10px; text-decoration: none; border-radius: 5px;margin-left: 10px;" th:href="${rejectUrl}">拒绝</a>
            </p>
            </p>
        </div>
    </div>
</div>
</body>
</html>
